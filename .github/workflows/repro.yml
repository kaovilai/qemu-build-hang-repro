name: QEMU Build Hang Repro

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # Race condition — spawn multiple concurrent builds to increase hit probability
  go123-arm64-hang:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU user-mode emulation
        run: |
          sudo podman run --rm --privileged \
            multiarch/qemu-user-static --reset -p yes

      - name: Show QEMU version
        run: |
          podman run --rm --platform linux/arm64 golang:1.23 \
            sh -c 'cat /proc/self/maps 2>/dev/null | head -1; uname -m' || true

      - name: "Build Go 1.23 for linux/arm64 — attempt ${{ matrix.attempt }}"
        continue-on-error: true
        run: |
          echo "::warning::Attempt ${{ matrix.attempt }}/5 — race condition may or may not trigger."
          timeout 180 podman build \
            --no-cache \
            --platform linux/arm64 \
            -f Containerfile.repro \
            . 2>&1 || echo "BUILD_EXIT_CODE=$?" >> "$GITHUB_ENV"

      - name: Report result
        run: |
          if [ "${BUILD_EXIT_CODE}" = "124" ]; then
            echo "::error::Attempt ${{ matrix.attempt }}: timed out — QEMU hang confirmed."
            echo "## Attempt ${{ matrix.attempt }}: HANG CONFIRMED" >> "$GITHUB_STEP_SUMMARY"
            echo "QEMU eventfd race triggered. Build killed after 3 minutes." >> "$GITHUB_STEP_SUMMARY"
            echo "[QEMU #2738](https://gitlab.com/qemu-project/qemu/-/work_items/2738)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          elif [ "${BUILD_EXIT_CODE}" = "" ] || [ "${BUILD_EXIT_CODE}" = "0" ]; then
            echo "::notice::Attempt ${{ matrix.attempt }}: succeeded — race not triggered this time."
            echo "## Attempt ${{ matrix.attempt }}: PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "Race condition did not trigger. QEMU version may have the fix." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Attempt ${{ matrix.attempt }}: failed with exit code ${BUILD_EXIT_CODE}"
            echo "## Attempt ${{ matrix.attempt }}: FAILED (exit ${BUILD_EXIT_CODE})" >> "$GITHUB_STEP_SUMMARY"
          fi

  # Control: Go 1.22 on same foreign arch — should always succeed
  go122-arm64-control:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU user-mode emulation
        run: |
          sudo podman run --rm --privileged \
            multiarch/qemu-user-static --reset -p yes

      - name: "Build Go 1.22 for linux/arm64 (EXPECTED TO SUCCEED)"
        run: |
          podman build \
            --platform linux/arm64 \
            -f Containerfile.repro-go1.22 \
            .

      - name: Report result
        if: success()
        run: |
          echo "## CONTROL: Go 1.22 PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "Go 1.22 cross-compilation completed. Issue is Go 1.23+ specific." >> "$GITHUB_STEP_SUMMARY"

  # Control: Native arch — should always succeed
  go123-native-control:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: "Build Go 1.23 for linux/amd64 (native, EXPECTED TO SUCCEED)"
        run: |
          podman build \
            --platform linux/amd64 \
            -f Containerfile.repro \
            .

      - name: Report result
        if: success()
        run: |
          echo "## CONTROL: Native amd64 PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "Go 1.23 builds fine without QEMU. Issue is QEMU-specific." >> "$GITHUB_STEP_SUMMARY"
